name: Cypress Tests

on:
  push:
    branches: [main, Tools/cypress]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      # ✅ Faster checkout (shallow clone)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ✅ Node setup + dependency caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/package-lock.json

      # ✅ Cypress handles install + start + run
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: project
          install-command: npm ci
          start: npm run dev
          wait-on: "http://localhost:5173"
          wait-on-timeout: 120